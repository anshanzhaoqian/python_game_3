name: Build and Publish Flask to GHCR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # Converts "YourGitHubUsername/YourRepoName" to lowercase for Docker standard compatibility
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v6

      # Step 2: Set up Docker Buildx for optimization
      - name: Set up Docker Buildx
        uses: actions/configure-pages@v5 # Optional utility, or omit for standard builds
        
      - name: Set up Docker Buildx Core
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to the GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      # Step 4: Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Step 5: Build and push the Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
